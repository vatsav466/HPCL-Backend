#server {
#    listen 80 default_server;
#    server_name _;
#    return 301 https://$host$request_uri;
#}

server {
    listen 8080;
    include /etc/nginx/conf.d/base_configuration/*.conf;
    include /etc/nginx/conf.d/custom_configuration/*.conf;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # root /opt/ceg/algo/ceg_ui;
    root /usr/share/nginx/algo_ui;
    index index.html index.htm;

    error_page 403 /403.html;
    location = /403.html {
        root /etc/nginx/conf.d/internal_routes;
        internal;
    }

    error_page 404 /404.html;
    location = /404.html {
        root /etc/nginx/conf.d/internal_routes;
        internal;
    }

    location / {
        try_files $uri $uri/ /index.html;

        # limit_except GET HEAD POST { deny all; }
        # error_page 404 /index.html;
        # error_page 403 =404 /404.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
       expires 3d;
       add_header Cache-Control "public, max-age=2592000, immutable";
    }

    location /api {
        limit_except GET HEAD POST PUT DELETE { deny all; }
        proxy_pass http://ceg_api_engine/api;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # Use regex for the /api/vts, /api/emlock, etc.
    location ~ ^/api/(vts/|emlock|cris|ims|hyperlocal) {
        limit_except GET HEAD POST PUT DELETE { deny all; }
        proxy_pass http://ceg_ingestion_api$request_uri;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    location /api/va {
        limit_except GET HEAD POST PUT DELETE { deny all; }
        proxy_pass http://ceg_ingestion_api_va$request_uri;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }
    
    location /api/ongoingtripsvts {
        limit_except GET HEAD POST PUT DELETE { deny all; }
        proxy_pass http://ceg_ingestion_api_ot$request_uri;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }
    
    location ~ ^/api/(ticketing|ticketcomment|ticketusermails|alertcategorymaster) {
            limit_except GET HEAD POST PUT DELETE { deny all; }
	    proxy_pass http://ceg_ticketing_api$request_uri;
	    proxy_set_header Upgrade $http_upgrade;
	    proxy_set_header Connection 'upgrade';
	    proxy_set_header Host $host;
	    proxy_cache_bypass $http_upgrade;
    }


    # Use regex for /api/cegrolemaster and /api/dncrolemaster
    location ~ ^/api/(cegrolemaster|dncrolemaster) {
        limit_except GET HEAD POST PUT DELETE { deny all; }
        proxy_pass http://ceg_dnc_api_engine$request_uri;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    location /auth/ {
        limit_except GET HEAD POST PUT DELETE { deny all; }
        proxy_pass https://localhost:8443/auth/;
        proxy_redirect off;
        proxy_buffering off;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_connect_timeout       1200s;
        proxy_send_timeout          1200s;
        proxy_read_timeout          1200s;
        send_timeout               1200s;
        aio threads;
    }
    
    location /downloads/ {
    	alias /opt/downloads/;
    }


    # ---------- ROUTES ----------

    location /mpspl/ {
        proxy_pass http://mpspl_backend/;

        # Standard proxy headers for IIS
        # Use host from request header (external proxy should preserve this)
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # External proxy handles HTTPS termination, forward as HTTPS to backend
        # Use X-Forwarded-Proto from upstream proxy if present, otherwise default to https
        # Since external proxy terminates SSL, client always sees HTTPS
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port 443;

        # Critical: Handle IIS redirects - rewrite all backend redirects to maintain /mpspl/ prefix
        # IIS redirects must be rewritten to preserve the /mpspl/ path prefix
        proxy_redirect http://$host/ https://$host/mpspl/;
        proxy_redirect http://$host:8080/ https://$host/mpspl/;
        proxy_redirect http://$host:80/ https://$host/mpspl/;
        proxy_redirect https://$host/ https://$host/mpspl/;
        proxy_redirect http://mpspl_backend/ https://$host/mpspl/;
        proxy_redirect / /mpspl/;

        # Prevent port and internal IP leakage in redirects
        absolute_redirect off;
        port_in_redirect off;

        # Preserve original request details
        proxy_set_header X-Original-URI $request_uri;

        # Timeouts for IIS operations
        proxy_read_timeout 300s;
        proxy_connect_timeout 30s;
        proxy_send_timeout 300s;

        # Buffer settings optimized for IIS responses
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
        proxy_busy_buffers_size 8k;
    }

