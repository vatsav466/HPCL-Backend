upstream ceg_api_engine {
    server localhost:9001;
    server localhost:9002;
    server localhost:9003;
    server localhost:9004;
    server localhost:9005;
}

upstream ceg_dnc_api_engine {
    server localhost:9009;
}

upstream ceg_ingestion_api {
    server localhost:9010;
    server localhost:9011;
    server localhost:9012;
    server localhost:9013;
    server localhost:9014;
}

server {
    listen 80 default_server;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    include /etc/nginx/conf.d/base_configuration/*.conf;
    include /etc/nginx/conf.d/custom_configuration/*.conf;
    root /opt/ceg/algo/ceg_ui;
    index index.html index.htm;

    error_page 403 /403.html;
    location = /403.html {
        root /etc/nginx/conf.d/internal_routes;
        internal;
    }

    error_page 404 /404.html;
    location = /404.html {
        root /etc/nginx/conf.d/internal_routes;
        internal;
    }

    location / {
        limit_except GET HEAD POST { deny all; }
        # error_page 404 /index.html;
        error_page 403 =404 /404.html;
    }

    location /api {
        limit_except GET HEAD POST PUT DELETE { deny all; }
        proxy_pass http://ceg_api_engine/api;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # Use regex for the /api/vts, /api/emlock, etc.
    location ~ ^/api/(vts|emlock|cris|ims|va) {
        limit_except GET HEAD POST PUT DELETE { deny all; }
        proxy_pass http://ceg_ingestion_api$request_uri;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # Use regex for /api/cegrolemaster and /api/dncrolemaster
    location ~ ^/api/(cegrolemaster|dncrolemaster) {
        limit_except GET HEAD POST PUT DELETE { deny all; }
        proxy_pass http://ceg_dnc_api_engine$request_uri;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    location /openapi.json {
        limit_except GET { deny all; }
        proxy_pass http://ceg_api_engine/openapi.json;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    location /docs {
        limit_except GET { deny all; }
        proxy_pass http://ceg_api_engine/docs;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    location /auth/ {
        limit_except GET HEAD POST PUT DELETE { deny all; }
        proxy_pass https://localhost:8443/auth/;
        proxy_redirect off;
        proxy_buffering off;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_connect_timeout       1200s;
        proxy_send_timeout          1200s;
        proxy_read_timeout          1200s;
        send_timeout               1200s;
        aio threads;
    }
}
