name: Python API CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  PYTHON_VERSION: "3.12"
  IMAGE_NAME: ghcr.io/${{ github.repository }}

permissions:
  contents: read
  packages: write   # needed to push to GHCR

jobs:

  # ==================================================================
  # STAGE 1 — LINT & UNIT TESTS
  #   Black, Flake8, MyPy, Bandit, pip-audit and Pytest all run
  #   regardless of each other's outcome (continue-on-error), so
  #   every issue shows up in one run. The job itself fails at the
  #   end if anything broke, which blocks every later stage.
  # ==================================================================
  lint-and-test:
    name: Lint & Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install Oracle Instant Client (required to build cx_Oracle)
        run: |
          sudo apt-get update
          # Ubuntu 24.04 (noble) runners renamed libaio1 -> libaio1t64
          # during the 64-bit time_t transition. Try the new name first,
          # fall back to the old one for 22.04/20.04 runners.
          sudo apt-get install -y libaio1t64 wget unzip || \
          sudo apt-get install -y libaio1 wget unzip
          sudo mkdir -p /opt/oracle && cd /opt/oracle
          sudo wget -q https://download.oracle.com/otn_software/linux/instantclient/instantclient-basiclite-linuxx64.zip
          sudo unzip -q instantclient-basiclite-linuxx64.zip
          sudo rm instantclient-basiclite-linuxx64.zip
          sudo ln -sf /opt/oracle/instantclient_* /opt/oracle/instantclient
          cd /opt/oracle/instantclient && sudo ln -sf libclntsh.so.* libclntsh.so
          echo "LD_LIBRARY_PATH=/opt/oracle/instantclient:$LD_LIBRARY_PATH" >> $GITHUB_ENV
          echo "OCI_LIB_DIR=/opt/oracle/instantclient" >> $GITHUB_ENV
          echo "OCI_INC_DIR=/opt/oracle/instantclient/sdk/include" >> $GITHUB_ENV

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          # Pin setuptools below 82 — newer setuptools dropped pkg_resources,
          # which breaks the legacy build of cx_Oracle 8.3.0 on Python 3.12.
          pip install "setuptools<82"
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install black flake8 mypy bandit pip-audit pytest pytest-cov httpx

      - name: Black (format check)
        id: black
        continue-on-error: true
        run: black --check --diff .

      - name: Flake8 (lint)
        id: flake8
        continue-on-error: true
        run: |
          flake8 . --count --statistics \
            --max-line-length=100 \
            --exclude=.git,__pycache__,venv,.venv

      - name: MyPy (type check)
        id: mypy
        continue-on-error: true
        run: mypy . --ignore-missing-imports

      - name: Bandit (static security scan)
        id: bandit
        continue-on-error: true
        run: bandit -r . -x ./tests,./venv -f json -o bandit-report.json

      - name: pip-audit (dependency vulnerability scan)
        id: pip_audit
        continue-on-error: true
        run: pip-audit -r requirements.txt -f json -o pip-audit-report.json

      - name: Pytest + Coverage
        id: pytest
        continue-on-error: true
        run: |
          pytest -v \
            --cov=. \
            --cov-report=term-missing \
            --cov-report=xml \
            --junitxml=pytest-report.xml

      - name: Upload Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-test-reports
          path: |
            pytest-report.xml
            coverage.xml
            bandit-report.json
            pip-audit-report.json
          if-no-files-found: ignore

      - name: Summary & Gate
        run: |
          echo "### Lint & Unit Tests Summary" >> $GITHUB_STEP_SUMMARY
          echo "- Black: ${{ steps.black.outcome }}"         >> $GITHUB_STEP_SUMMARY
          echo "- Flake8: ${{ steps.flake8.outcome }}"        >> $GITHUB_STEP_SUMMARY
          echo "- MyPy: ${{ steps.mypy.outcome }}"            >> $GITHUB_STEP_SUMMARY
          echo "- Bandit: ${{ steps.bandit.outcome }}"        >> $GITHUB_STEP_SUMMARY
          echo "- pip-audit: ${{ steps.pip_audit.outcome }}"  >> $GITHUB_STEP_SUMMARY
          echo "- Pytest: ${{ steps.pytest.outcome }}"        >> $GITHUB_STEP_SUMMARY

          if [[ "${{ steps.black.outcome }}"     == "failure" || \
                "${{ steps.flake8.outcome }}"    == "failure" || \
                "${{ steps.mypy.outcome }}"      == "failure" || \
                "${{ steps.bandit.outcome }}"    == "failure" || \
                "${{ steps.pip_audit.outcome }}" == "failure" || \
                "${{ steps.pytest.outcome }}"    == "failure" ]]; then
            echo "One or more checks failed. See lint-test-reports artifact and logs above."
            exit 1
          fi

  # ==================================================================
  # STAGE 2 — BUILD APP
  #   Builds the Docker image once and saves it to a tarball artifact
  #   so the E2E stage and the push stage reuse the exact same image
  #   instead of rebuilding it twice.
  # ==================================================================
  build-app:
    name: Build App
    needs: lint-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Image (local, not pushed)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Save Image to Tarball
        run: docker save ${{ env.IMAGE_NAME }}:${{ github.sha }} -o app-image.tar

      - name: Upload Image Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-image
          path: app-image.tar
          retention-days: 1

  # ==================================================================
  # STAGE 3 — E2E & VISUAL REGRESSION
  #   Loads the exact image built in Stage 2, runs it as a container,
  #   and hits the real endpoints end-to-end. (This is a backend API,
  #   so "visual regression" here means response/contract regression
  #   rather than pixel diffing — swap in Percy/Chromatic instead if
  #   you also have a frontend to visually diff.)
  # ==================================================================
  e2e-tests:
    name: E2E & Visual Regression Tests
    needs: build-app
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download Image Artifact
        uses: actions/download-artifact@v4
        with:
          name: app-image

      - name: Load Docker Image
        run: docker load -i app-image.tar

      - name: Run Container
        run: |
          docker run -d \
            --name app-under-test \
            -p 8000:8000 \
            --env-file .env.ci \
            ${{ env.IMAGE_NAME }}:${{ github.sha }} || \
          docker run -d \
            --name app-under-test \
            -p 8000:8000 \
            ${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Wait for App to be Healthy
        run: |
          for i in {1..15}; do
            if curl -sf http://localhost:8000/health; then
              echo "App is up"
              exit 0
            fi
            echo "Waiting for app... ($i/15)"
            sleep 2
          done
          echo "App did not become healthy in time"
          docker logs app-under-test
          exit 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install E2E Test Dependencies
        run: pip install pytest httpx

      - name: Run E2E Tests Against Live Container
        run: pytest tests/e2e -v --junitxml=e2e-report.xml
        env:
          API_BASE_URL: http://localhost:8000

      - name: Upload E2E Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-report
          path: e2e-report.xml
          if-no-files-found: ignore

      - name: Dump Container Logs on Failure
        if: failure()
        run: docker logs app-under-test

      - name: Stop Container
        if: always()
        run: docker rm -f app-under-test || true

  # ==================================================================
  # STAGE 4 — BUILD & PUSH DOCKER IMAGE
  #   Reuses the same tarball from Stage 2 (already tested in Stage 3)
  #   and pushes it to GHCR — no rebuild, so what you tested is
  #   exactly what ships.
  # ==================================================================
  build-and-push:
    name: Build & Push Docker Image
    needs: e2e-tests
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}
    steps:
      - name: Download Image Artifact
        uses: actions/download-artifact@v4
        with:
          name: app-image

      - name: Load Docker Image
        run: docker load -i app-image.tar

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image tag
        id: meta
        run: echo "tag=${{ env.IMAGE_NAME }}:${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Tag as latest
        run: docker tag ${{ env.IMAGE_NAME }}:${{ github.sha }} ${{ env.IMAGE_NAME }}:latest

      - name: Push to GHCR
        run: |
          docker push ${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker push ${{ env.IMAGE_NAME }}:latest

  # ==================================================================
  # STAGE 5 — DEPLOY (SSH + Docker on your server, behind Nginx)
  # ==================================================================
  deploy:
    name: Deploy
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deploy to Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker pull ${{ needs.build-and-push.outputs.image_tag }}

            # Stop & remove old container if it exists
            docker stop python-api || true
            docker rm python-api || true

            # Start new container
            docker run -d \
              --name python-api \
              --restart unless-stopped \
              -p 127.0.0.1:8000:8000 \
              --env-file /opt/python-api/.env \
              ${{ needs.build-and-push.outputs.image_tag }}

            # Reload nginx (already configured to proxy to 127.0.0.1:8000)
            sudo systemctl reload nginx

            # Clean up old images to save disk space
            docker image prune -f
