name: Backend CI/CD Pipeline

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

  workflow_dispatch:

env:
  PYTHON_VERSION: "3.11"
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  # Directories that should never be linted / type-checked / scanned.
  # Keep this list in sync across every tool step below.
  EXCLUDE_DIRS: "venv,.venv,env,.env,__pycache__,build,dist,migrations,.git,node_modules"

jobs:

  # ---------------------------------------------------------
  # 1. LINT, TEST & SECURITY
  # ---------------------------------------------------------
  test:
    name: Lint, Test & Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      # Required for python-ldap
      - name: Install Ubuntu Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            python3-dev \
            libldap2-dev \
            libsasl2-dev \
            libssl-dev

      - name: Create Virtual Environment
        run: |
          python -m venv venv

      - name: Install Python Dependencies
        run: |
          source venv/bin/activate
          python -m pip install --upgrade pip setuptools wheel

          pip install -r requirements.txt

          pip install \
            flake8 \
            black \
            isort \
            mypy \
            pytest \
            pytest-cov \
            bandit \
            pip-audit

      # NOTE: venv/.venv/etc are excluded below so third-party packages
      # installed into the virtualenv are never linted as if they were
      # our own source code. This is what caused the flood of
      # pyasn1_modules / site-packages errors previously.

      - name: Run Flake8
        run: |
          source venv/bin/activate
          flake8 . --count --statistics --max-line-length=120 \
            --ignore=E,W,F \
            --exclude="${{ env.EXCLUDE_DIRS }}"

      - name: Black Check
        continue-on-error: true
        run: |
          source venv/bin/activate
          black --check . \
            --extend-exclude "/(venv|\.venv|env|\.env|__pycache__|build|dist|migrations|node_modules|uat|UrdhvaBase|manual_reports)/"

      - name: Isort Check
        continue-on-error: true
        run: |
          source venv/bin/activate
          isort --check-only . \
            --skip venv --skip .venv --skip env --skip .env \
            --skip migrations --skip node_modules --skip build --skip dist \
            --skip uat --skip UrdhvaBase --skip manual_reports

      - name: MyPy
        continue-on-error: true
        run: |
          source venv/bin/activate
          mypy . --ignore-missing-imports \
            --exclude '(venv|\.venv|env|\.env|migrations|build|dist|node_modules|uat|UrdhvaBase|manual_reports)/'

      - name: Run Unit Tests
        continue-on-error: true
        run: |
          source venv/bin/activate
          pytest -v

      - name: Coverage
        continue-on-error: true
        run: |
          source venv/bin/activate
          pytest --cov=. --cov-report=xml --cov-report=term

      - name: Upload Coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

      - name: Bandit Scan
        continue-on-error: true
        run: |
          source venv/bin/activate
          bandit -r . -x ./venv,./.venv,./env,./.env,./tests,./migrations,./node_modules,./uat,./UrdhvaBase,./manual_reports -ll

      - name: Dependency Scan
        continue-on-error: true
        run: |
          source venv/bin/activate
          pip-audit -r requirements.txt

      - name: API Tests
        run: |
          if [ -f postman/collection.json ]; then
            npm install -g newman
            newman run postman/collection.json \
              -e postman/environment.json \
              --reporters cli,junit \
              --reporter-junit-export newman-report.xml
          else
            echo "No Postman collection found."
          fi

  # ---------------------------------------------------------
  # 2. DEPLOY
  # ---------------------------------------------------------
  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Set lowercase image name
        run: |
          echo "IMAGE_NAME_LOWER=$(echo '${{ env.IMAGE_NAME }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Verify required secrets
        run: |
          missing=0

          [ -z "${{ secrets.DEPLOY_HOST }}" ] && echo "::error::DEPLOY_HOST missing" && missing=1
          [ -z "${{ secrets.DEPLOY_USER }}" ] && echo "::error::DEPLOY_USER missing" && missing=1
          [ -z "${{ secrets.DEPLOY_PASSWORD }}" ] && echo "::error::DEPLOY_PASSWORD missing" && missing=1

          if [ "$missing" -eq 1 ]; then
            exit 1
          fi

      - name: Deploy to Server
        uses: appleboy/ssh-action@v1.0.3
        env:
          DEPLOY_PASSWORD: ${{ secrets.DEPLOY_PASSWORD }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          password: ${{ secrets.DEPLOY_PASSWORD }}
          port: 22
          envs: DEPLOY_PASSWORD
          script: |

            run_sudo() {
              echo "$DEPLOY_PASSWORD" | sudo -S "$@"
            }

            run_sudo -v

            # Clone or pull latest code on server
            if [ -d "/opt/hpcl-backend" ]; then
              cd /opt/hpcl-backend
              git pull origin main
            else
              git clone https://github.com/vatsav466/HPCL-Backend.git /opt/hpcl-backend
              cd /opt/hpcl-backend
            fi

            # Build Docker image on server
            run_sudo docker build -t hpcl-backend .

            # Stop and remove existing container
            run_sudo docker stop hpcl-backend || true
            run_sudo docker rm hpcl-backend || true

            # Run new container
            run_sudo docker run -d \
              --name hpcl-backend \
              --restart unless-stopped \
              -p 8000:8000 \
              hpcl-backend

            # Clean up old images
            run_sudo docker image prune -af
