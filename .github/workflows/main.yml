name: Backend CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.11"
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ──────────────────────────────────────────────
  # 1. CODE QUALITY & TESTS
  # ──────────────────────────────────────────────
  test:
    name: Lint, Test & Scan
    runs-on: ubuntu-latest

    steps:
      # ---- Checkout Code ----
      - name: Checkout Code
        uses: actions/checkout@v4

      # ---- Setup Python ----
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      # ---- Cache pip Packages ----
      - name: Cache pip Packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      # ---- Create Virtual Environment ----
      - name: Create Virtual Environment
        run: |
          python -m venv venv
          echo "$PWD/venv/bin" >> $GITHUB_PATH

      # ---- Install Dependencies ----
      - name: Install Dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 black isort mypy pytest pytest-cov bandit pip-audit

      # ---- Lint ----
      - name: Lint (flake8)
        run: flake8 . --count --statistics --max-line-length=120

      # ---- Format Check ----
      - name: Format Check (black)
        run: black --check .

      # ---- Import Sorting Check ----
      - name: Import Sorting Check (isort)
        run: isort --check-only .

      # ---- Type Checking ----
      - name: Type Checking (mypy)
        run: mypy . --ignore-missing-imports
        continue-on-error: true   # remove once codebase is fully typed

      # ---- Unit Tests ----
      - name: Unit Tests (pytest)
        run: pytest -v

      # ---- Code Coverage ----
      - name: Code Coverage
        run: pytest --cov=. --cov-report=xml --cov-report=term

      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

      # ---- Security Scan ----
      - name: Security Scan (bandit)
        run: bandit -r . -x ./venv,./tests -ll

      # ---- Dependency Vulnerability Scan ----
      - name: Dependency Vulnerability Scan (pip-audit)
        run: pip-audit -r requirements.txt
        continue-on-error: true   # flip to false once known CVEs are cleared

      # ---- API Tests ----
      - name: API Tests (Postman/Newman)
        run: |
          if [ -f postman/collection.json ]; then
            npm install -g newman
            newman run postman/collection.json -e postman/environment.json --reporters cli,junit --reporter-junit-export newman-report.xml
          else
            echo "No Postman collection found, skipping."
          fi

  # ──────────────────────────────────────────────
  # 2. BUILD & PUSH DOCKER IMAGE
  # ──────────────────────────────────────────────
  build-and-push:
    name: Build & Push Docker Image
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set Image Tag
        id: meta
        run: echo "tag=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: true
          tags: |
            ${{ steps.meta.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha

  # ──────────────────────────────────────────────
  # 3. DEPLOY VIA SSH
  # ──────────────────────────────────────────────
  deploy:
    name: SSH Deploy to Server
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: production
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: SSH into Server & Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker pull ${{ needs.build-and-push.outputs.image_tag }}
            docker compose -f /opt/hpcl-backend/docker-compose.yml down
            docker compose -f /opt/hpcl-backend/docker-compose.yml up -d
            docker image prune -f
