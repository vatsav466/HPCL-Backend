name: Python API CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  PYTHON_VERSION: "3.12"
  IMAGE_NAME: ghcr.io/${{ github.repository }}

permissions:
  contents: read
  packages: write

jobs:

  # ------------------------------------------------------------------
  # STAGE 1: Lint & Unit Tests
  # ------------------------------------------------------------------
  lint-and-test:
    name: Lint & Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install System Dependencies (Oracle client libs)
        run: |
          sudo apt-get update
          # Ubuntu 24.04 (noble) runners renamed libaio1 -> libaio1t64
          # during the 64-bit time_t transition. Try new name first,
          # fall back to old name for 22.04/20.04 runners.
          sudo apt-get install -y libaio1t64 wget unzip || \
          sudo apt-get install -y libaio1 wget unzip

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          # cx_Oracle==8.3.0 predates Python 3.12, so no prebuilt wheel
          # exists for cp312 -- pip must build it from source. Modern
          # setuptools dropped pkg_resources from its isolated build
          # env, which breaks that build. Fix: install a compatible
          # setuptools in the MAIN env, then install cx_Oracle with
          # --no-build-isolation so it uses that setuptools instead of
          # pulling a fresh (broken) one into an isolated build env.
          pip install "setuptools<81" wheel
          pip install --no-build-isolation cx_Oracle==8.3.0
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pytest pytest-cov httpx black flake8 mypy bandit pip-audit

      - name: Black (format check)
        id: black
        continue-on-error: true
        run: black --check --diff .

      - name: Flake8 (lint)
        id: flake8
        continue-on-error: true
        run: |
          flake8 . --count --statistics \
            --max-line-length=100 \
            --exclude=.git,__pycache__,venv,.venv

      - name: MyPy (type check)
        id: mypy
        continue-on-error: true
        run: mypy . --ignore-missing-imports

      - name: Bandit (security scan)
        id: bandit
        continue-on-error: true
        run: bandit -r . -x ./tests,./venv -f json -o bandit-report.json

      - name: pip-audit (dependency scan)
        id: pip_audit
        continue-on-error: true
        run: pip-audit -r requirements.txt -f json -o pip-audit-report.json || true

      - name: Run Unit Tests with Coverage
        id: tests
        continue-on-error: true
        run: |
          pytest -v \
            --cov=. \
            --cov-report=term-missing \
            --cov-report=xml \
            --junitxml=pytest-report.xml

      - name: Upload Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-and-test-reports
          path: |
            pytest-report.xml
            coverage.xml
            bandit-report.json
            pip-audit-report.json
          if-no-files-found: ignore

      - name: Summary / Fail if anything failed
        run: |
          echo "### Lint & Unit Tests Summary" >> $GITHUB_STEP_SUMMARY
          echo "- Black: ${{ steps.black.outcome }}"       >> $GITHUB_STEP_SUMMARY
          echo "- Flake8: ${{ steps.flake8.outcome }}"      >> $GITHUB_STEP_SUMMARY
          echo "- MyPy: ${{ steps.mypy.outcome }}"          >> $GITHUB_STEP_SUMMARY
          echo "- Bandit: ${{ steps.bandit.outcome }}"      >> $GITHUB_STEP_SUMMARY
          echo "- pip-audit: ${{ steps.pip_audit.outcome }}" >> $GITHUB_STEP_SUMMARY
          echo "- Pytest: ${{ steps.tests.outcome }}"       >> $GITHUB_STEP_SUMMARY

          if [[ "${{ steps.black.outcome }}" == "failure" || \
                "${{ steps.flake8.outcome }}" == "failure" || \
                "${{ steps.mypy.outcome }}" == "failure" || \
                "${{ steps.bandit.outcome }}" == "failure" || \
                "${{ steps.tests.outcome }}" == "failure" ]]; then
            echo "One or more checks failed. See summary and artifacts above."
            exit 1
          fi

  # ------------------------------------------------------------------
  # STAGE 2: Build App
  # ------------------------------------------------------------------
  build-app:
    name: Build App
    needs: lint-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install System Dependencies (Oracle client libs)
        run: |
          sudo apt-get update
          sudo apt-get install -y libaio1t64 wget unzip || \
          sudo apt-get install -y libaio1 wget unzip

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "setuptools<81" wheel
          pip install --no-build-isolation cx_Oracle==8.3.0
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Byte-compile / Build Sanity Check
        run: |
          # Catches syntax errors and broken imports across the whole app
          python -m compileall -q . -x '(venv|\.venv|tests)'

      - name: Verify App Imports Cleanly
        run: |
          # Adjust this import path to match your actual app entrypoint,
          # e.g. app.main, api_manager.main, etc.
          python -c "import app.main" || echo "::warning::Update this import path to your real entrypoint"

  # ------------------------------------------------------------------
  # STAGE 3: E2E & Integration Tests
  # ------------------------------------------------------------------
  e2e-tests:
    name: E2E & Visual Regression
    needs: build-app
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install System Dependencies (Oracle client libs)
        run: |
          sudo apt-get update
          sudo apt-get install -y libaio1t64 wget unzip || \
          sudo apt-get install -y libaio1 wget unzip

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "setuptools<81" wheel
          pip install --no-build-isolation cx_Oracle==8.3.0
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pytest httpx

      - name: Run E2E / Integration Tests
        run: |
          # Point this at your actual e2e test directory/marker.
          # "Visual regression" is normally a frontend concept (screenshot
          # diffing) -- if this repo is backend-only, this stage is really
          # your end-to-end API/integration suite against a running app.
          pytest tests/e2e -v || echo "::warning::No tests/e2e directory found yet"

  # ------------------------------------------------------------------
  # STAGE 4: Build & Push Docker Image
  # ------------------------------------------------------------------
  build-and-push:
    name: Build & Push Docker Image
    needs: e2e-tests
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image tag
        id: meta
        run: echo "tag=${{ env.IMAGE_NAME }}:${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ steps.meta.outputs.tag }}
            ${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ------------------------------------------------------------------
  # STAGE 5: Deploy
  # ------------------------------------------------------------------
  deploy:
    name: Deploy
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deploy to Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker pull ${{ needs.build-and-push.outputs.image_tag }}

            docker stop python-api || true
            docker rm python-api || true

            docker run -d \
              --name python-api \
              --restart unless-stopped \
              -p 127.0.0.1:8000:8000 \
              --env-file /opt/python-api/.env \
              ${{ needs.build-and-push.outputs.image_tag }}

            # Smoke test before reloading nginx
            sleep 5
            curl -f http://127.0.0.1:8000/health || (docker logs python-api && exit 1)

            sudo systemctl reload nginx
            docker image prune -f
