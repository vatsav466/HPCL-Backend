name: Backend CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  # Change this if your services actually require a different Python version.
  PYTHON_VERSION: '3.11'
  REGISTRY: ghcr.io
  # Hardcoded lowercase — Docker rejects image names with uppercase letters.
  # Update this to your real image/repo name if it differs.
  IMAGE_NAME: vatsav466/hpcl-backend

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------
  # 1. LINT + TESTS (pytest AND unittest, as requested)
  # ---------------------------------------------------------
  lint-and-test:
    name: Lint & Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # Test/lint tooling not in requirements.txt (installed here so it
          # never touches your actual requirements file)
          pip install flake8 pytest pytest-cov

      - name: Run flake8 lint
        run: |
          # Uses the .flake8 config already in your repo root.
          # This step is non-fatal so the pipeline can still run tests and
          # report lint issues in the summary — remove "|| true" below if
          # you want lint failures to hard-fail the pipeline instead.
          flake8 . || echo "::warning::flake8 reported issues — see logs above"

      - name: Run pytest with coverage
        run: |
          pytest --cov=. --cov-report=xml --cov-report=term \
                 --junitxml=pytest-results.xml \
                 || echo "::warning::pytest reported failures — see logs above"

      - name: Run unittest suite
        run: |
          # Auto-discovers any TestCase-based tests across the whole repo.
          # Runs independently of pytest, per your request to have both.
          python -m unittest discover -s . -p "test_*.py" -v \
                 || echo "::warning::unittest reported failures — see logs above"

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            coverage.xml
            pytest-results.xml
          retention-days: 7

  # ---------------------------------------------------------
  # 2. DOCKER BUILD & PUSH TO CONTAINER REGISTRY (GHCR)
  # ---------------------------------------------------------
  docker-build-and-push:
    name: Build & Push Docker Image
    needs: lint-and-test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          # Using a PAT (write:packages scope) instead of the default
          # GITHUB_TOKEN — sidesteps repo "Workflow permissions" settings
          # that can otherwise cause "denied: permission_denied: write_package".
          password: ${{ secrets.GHCR_PAT }}

      - name: Set lowercase image name
        run: echo "IMAGE_NAME_LOWER=$(echo '${{ env.IMAGE_NAME }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---------------------------------------------------------
  # 3. DEPLOY — SSH into your server and redeploy the container
  # ---------------------------------------------------------
  deploy:
    name: Deploy
    needs: docker-build-and-push
    runs-on: ubuntu-latest
    # If DEPLOY_HOST etc. live under Settings > Environments > <name>
    # instead of plain repo Secrets, uncomment and set the exact name.
    # environment: production
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Set lowercase image name
        run: echo "IMAGE_NAME_LOWER=$(echo '${{ env.IMAGE_NAME }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Verify required secrets are set
        run: |
          missing=0
          [ -z "${{ secrets.DEPLOY_HOST }}" ] && echo "::error::DEPLOY_HOST secret is missing" && missing=1
          [ -z "${{ secrets.DEPLOY_USER }}" ] && echo "::error::DEPLOY_USER secret is missing" && missing=1
          [ -z "${{ secrets.DEPLOY_PASSWORD }}" ] && echo "::error::DEPLOY_PASSWORD secret is missing" && missing=1
          [ -z "${{ secrets.GHCR_PAT }}" ] && echo "::error::GHCR_PAT secret is missing" && missing=1
          if [ "$missing" -eq 1 ]; then
            echo "Add missing secret(s) under Settings > Secrets and variables > Actions > Secrets."
            exit 1
          fi
          echo "All required secrets are present."

      - name: Deploy to server via SSH
        env:
          DEPLOY_PASSWORD: ${{ secrets.DEPLOY_PASSWORD }}
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          password: ${{ secrets.DEPLOY_PASSWORD }}
          port: 22
          envs: DEPLOY_PASSWORD
          script: |
            # PREFERRED FIX (do once, then delete every run_sudo call below):
            #   ssh in and run: sudo usermod -aG docker $USER
            #   then log out/in once so group membership takes effect.
            run_sudo() {
              echo "$DEPLOY_PASSWORD" | sudo -S "$@"
            }

            run_sudo -v

            run_sudo docker login ghcr.io -u ${{ github.actor }} --password-stdin <<< "${{ secrets.GHCR_PAT }}"

            run_sudo docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}:latest

            run_sudo docker stop hpcl-backend || true
            run_sudo docker rm hpcl-backend || true

            # NOTE: update 8000:8000 to match the port your backend actually
            # listens on (e.g. FastAPI/uvicorn, Flask, Django default, etc.)
            run_sudo docker run -d \
              --name hpcl-backend \
              --restart unless-stopped \
              -p 8000:8000 \
              ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}:latest

            run_sudo docker image prune -f
