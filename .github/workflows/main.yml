name: Python API CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  PYTHON_VERSION: "3.12"
  IMAGE_NAME: ghcr.io/${{ github.repository }}

permissions:
  contents: read
  packages: write

jobs:

  # ==================================================================
  # 1) LINT & UNIT TESTS
  # ==================================================================
  lint-and-test:
    name: Lint & Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          # python-ldap needs LDAP/SASL/SSL headers (lber.h, ldap.h) to compile
          sudo apt-get install -y \
            libldap2-dev \
            libsasl2-dev \
            libssl-dev

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install black flake8 isort mypy pytest pytest-cov httpx bandit pip-audit

      - name: Black (format check)
        id: black
        continue-on-error: true
        run: black --check --diff .

      - name: Flake8 (lint)
        id: flake8
        continue-on-error: true
        run: |
          flake8 . --count --statistics \
            --max-line-length=100 \
            --exclude=.git,__pycache__,venv,.venv

      - name: isort (import sorting check)
        id: isort
        continue-on-error: true
        run: isort --check-only --diff .

      - name: MyPy (type check)
        id: mypy
        continue-on-error: true
        run: mypy . --ignore-missing-imports

      - name: Run Unit Tests with Coverage
        id: pytest
        continue-on-error: true
        run: |
          pytest -v \
            --cov=. \
            --cov-report=term-missing \
            --cov-report=xml \
            --junitxml=pytest-report.xml || true

      - name: Bandit (static security scan)
        id: bandit
        continue-on-error: true
        run: bandit -r . -x ./tests,./venv -f json -o bandit-report.json

      - name: pip-audit (dependency vulnerability scan)
        id: pip_audit
        continue-on-error: true
        run: pip-audit -r requirements.txt -f json -o pip-audit-report.json || true

      - name: Run API Tests
        if: always()
        continue-on-error: true
        run: |
          python -m pip install --upgrade pip pytest httpx
          if [ -d "tests/api" ]; then pytest tests/api -v || true; fi

      - name: Upload Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-and-test-reports
          path: |
            pytest-report.xml
            coverage.xml
            bandit-report.json
            pip-audit-report.json
          if-no-files-found: ignore

      - name: Summary
        if: always()
        run: |
          echo "### Lint & Unit Tests Summary" >> $GITHUB_STEP_SUMMARY
          echo "- Black: ${{ steps.black.outcome }}"     >> $GITHUB_STEP_SUMMARY
          echo "- Flake8: ${{ steps.flake8.outcome }}"    >> $GITHUB_STEP_SUMMARY
          echo "- isort: ${{ steps.isort.outcome }}"      >> $GITHUB_STEP_SUMMARY
          echo "- MyPy: ${{ steps.mypy.outcome }}"        >> $GITHUB_STEP_SUMMARY
          echo "- Bandit: ${{ steps.bandit.outcome }}"    >> $GITHUB_STEP_SUMMARY
          echo "- Pytest: ${{ steps.pytest.outcome }}"    >> $GITHUB_STEP_SUMMARY

  # ==================================================================
  # 2) BUILD APP  (build the Docker image once, don't push yet)
  # ==================================================================
  build-app:
    name: Build App
    needs: lint-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Image (local only)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: local/python-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Save Image as Artifact
        run: docker save local/python-api:${{ github.sha }} -o app-image.tar

      - name: Upload Image Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-image
          path: app-image.tar
          retention-days: 1

  # ==================================================================
  # 3) E2E & VISUAL REGRESSION  (run against the image built above)
  # ==================================================================
  e2e-and-visual-regression:
    name: E2E & Visual Regression
    needs: build-app
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download Image Artifact
        uses: actions/download-artifact@v4
        with:
          name: app-image

      - name: Load Image
        run: docker load -i app-image.tar

      - name: Start App Container
        run: |
          docker run -d --name python-api-e2e -p 8000:8000 \
            local/python-api:${{ github.sha }}

      - name: Wait for App to be Healthy
        continue-on-error: true
        run: |
          for i in {1..15}; do
            if curl -sf http://localhost:8000/health; then
              echo "App is up"; exit 0
            fi
            echo "Waiting for app... ($i)"; sleep 2
          done
          echo "App failed to become healthy"; docker logs python-api-e2e; exit 1 || true

      - name: Run E2E Tests
        if: always()
        continue-on-error: true
        run: |
          python -m pip install --upgrade pip pytest httpx
          if [ -d "tests/e2e" ]; then pytest tests/e2e -v || true; fi

      - name: Dump Container Logs on Failure
        if: failure()
        run: docker logs python-api-e2e

      - name: Stop Container
        if: always()
        run: docker rm -f python-api-e2e || true

  # ==================================================================
  # 4) BUILD & PUSH DOCKER IMAGE  (re-tag the already-tested image, push it)
  # ==================================================================
  build-and-push-docker-image:
    name: Build & Push Docker Image
    needs: e2e-and-visual-regression
    if: always() && github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}
    steps:
      - name: Download Image Artifact
        uses: actions/download-artifact@v4
        with:
          name: app-image

      - name: Load Image
        run: docker load -i app-image.tar

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image tag
        id: meta
        run: echo "tag=${{ env.IMAGE_NAME }}:${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Tag & Push
        run: |
          docker tag local/python-api:${{ github.sha }} ${{ steps.meta.outputs.tag }}
          docker tag local/python-api:${{ github.sha }} ${{ env.IMAGE_NAME }}:latest
          docker push ${{ steps.meta.outputs.tag }}
          docker push ${{ env.IMAGE_NAME }}:latest

  # ==================================================================
  # 5) DEPLOY  (SSH + Docker on your server, behind Nginx)
  # ==================================================================
  deploy:
    name: Deploy
    needs: build-and-push-docker-image
    if: always()
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deploy to Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker pull ${{ needs.build-and-push-docker-image.outputs.image_tag }}

            docker stop python-api || true
            docker rm python-api || true

            docker run -d \
              --name python-api \
              --restart unless-stopped \
              -p 127.0.0.1:8000:8000 \
              --env-file /opt/python-api/.env \
              ${{ needs.build-and-push-docker-image.outputs.image_tag }}

            sudo systemctl reload nginx
            docker image prune -f