name: Backend CI Pipeline

on:
  push:
    branches:
      - main
      - backend
      - pipeline
  pull_request:
    branches:
      - main
      - backend

permissions:
  contents: read

env:
  REGISTRY: ghcr.io
  # Adjust if your GHCR image name should be different — must be all lowercase.
  IMAGE_NAME: vatsav466/hpcl-backend

jobs:
  backend-ci:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ".:./utilities:./cache_gateway:./services:./services/base_configuration:./RuleChain:./vendor_ingestion_api:./things_board:./orchestrator:./UrdhvaBase:./prod:./api_manager_ticketing:./workflows:./SOD:./uat:./Agents:./manual_reports:./Thingsboard:./authenticator:./api_manager:./ceg_role_master_api"
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Ubuntu Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gcc \
            g++ \
            build-essential \
            libldap2-dev \
            libsasl2-dev \
            libssl-dev \
            ldap-utils

      - name: Install Python Tools and Requirements
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install flake8 pylint pytest
          if [ -f requirements.txt ]; then
            python -m pip install -r requirements.txt
          fi

      - name: Debug Python Import Paths
        run: |
          python --version
          echo "PYTHONPATH=$PYTHONPATH"
          python - <<'PY'
          import sys
          import types
          print("Python executable:", sys.executable)
          print("types module loaded from:", types.__file__)
          PY

      - name: Run Flake8
        continue-on-error: true
        run: |
          flake8 . --isolated \
            --ignore=E999,F821,F824 \
            --max-line-length=127 \
            --max-complexity=10 \
            --statistics

      - name: Run Pylint
        continue-on-error: true
        run: |
          FILES=$(git ls-files "*.py")
          if [ -n "$FILES" ]; then
            pylint $FILES || true
          else
            echo "No Python files found."
          fi

      - name: Run Pytest
        continue-on-error: true
        run: |
          if [ -d tests ]; then
            python -m pytest -v
          else
            echo "No tests directory found."
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Newman
        run: npm install -g newman

      - name: Run Newman Collection
        continue-on-error: true
        run: |
          if [ -f tests/postman_collection.json ]; then
            newman run tests/postman_collection.json
          else
            echo "No Postman collection found."
          fi

  # ---------------------------------------------------------
  # DOCKER BUILD & PUSH TO CONTAINER REGISTRY (GHCR)
  # ---------------------------------------------------------
  docker-build-and-push:
    name: Build & Push Docker Image
    needs: backend-ci
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          # Using GHCR_PAT (a personal access token with the write:packages
          # scope) instead of the default GITHUB_TOKEN. GITHUB_TOKEN's
          # package-write access depends on the repo's default workflow
          # permissions (Settings > Actions > General > Workflow permissions)
          # — if that's set to "Read repository contents permission" the
          # push fails with "denied: permission_denied: write_package" even
          # though this job already requests packages: write above. A PAT
          # sidesteps that setting entirely. You already have GHCR_PAT saved
          # as a secret for the deploy job, so it's reused here.
          password: ${{ secrets.GHCR_PAT }}

      # Docker image names must be all lowercase — GitHub repo names can have
      # capital letters, so we normalize it here once and reuse it in every
      # step below instead of github.repository directly.
      - name: Set lowercase image name
        run: echo "IMAGE_NAME_LOWER=$(echo '${{ env.IMAGE_NAME }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---------------------------------------------------------
  # DEPLOY — actually connects to your server and redeploys
  # ---------------------------------------------------------
  deploy:
    name: Deploy
    needs: docker-build-and-push
    runs-on: ubuntu-latest
    # If DEPLOY_HOST etc. were added under Settings > Environments > <name>
    # instead of the plain repo Secrets tab, uncomment the next line and
    # put that environment's exact name here, or the job can't see them.
    # environment: production
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      # Same lowercasing as the build job — env vars set via GITHUB_ENV
      # don't carry over between jobs, so this must be repeated here.
      - name: Set lowercase image name
        run: echo "IMAGE_NAME_LOWER=$(echo '${{ env.IMAGE_NAME }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Verify required secrets are set
        run: |
          missing=0
          [ -z "${{ secrets.DEPLOY_HOST }}" ] && echo "::error::DEPLOY_HOST secret is missing or empty" && missing=1
          [ -z "${{ secrets.DEPLOY_USER }}" ] && echo "::error::DEPLOY_USER secret is missing or empty" && missing=1
          [ -z "${{ secrets.DEPLOY_PASSWORD }}" ] && echo "::error::DEPLOY_PASSWORD secret is missing or empty" && missing=1
          [ -z "${{ secrets.GHCR_PAT }}" ] && echo "::error::GHCR_PAT secret is missing or empty" && missing=1
          if [ "$missing" -eq 1 ]; then
            echo "Add the missing secret(s) under Settings > Secrets and variables > Actions > Secrets tab (repository secrets)."
            echo "If they already exist there but this still fails, they may have been added under Settings > Environments instead — uncomment the 'environment:' line above this step and set it to that environment's name."
            exit 1
          fi
          echo "All required secrets are present."

      - name: Deploy to server via SSH
        env:
          # This is what actually makes ssh-action's `envs:` list below work —
          # "envs: DEPLOY_PASSWORD" only forwards a variable of that name if
          # one exists in the step's env. Without this block $DEPLOY_PASSWORD
          # is empty on the remote side, so every sudo -S call gets a blank
          # password — exactly the "no password was provided" loop you saw.
          DEPLOY_PASSWORD: ${{ secrets.DEPLOY_PASSWORD }}
          GHCR_PAT: ${{ secrets.GHCR_PAT }}
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          password: ${{ secrets.DEPLOY_PASSWORD }}
          port: 22
          # Pass secrets in as real remote env vars instead of interpolating
          # them into the script text — avoids quoting/escaping bugs if
          # either value ever contains $, ", `, etc.
          envs: DEPLOY_PASSWORD,GHCR_PAT
          # docker pull + login + health-check can run past the 10m default
          # on a slow link; give it more room so the connection doesn't get
          # cut mid-script (which is what left the last container stuck in
          # "Created" — the run command started but the session died before
          # the daemon finished bringing it up).
          command_timeout: 20m
          script: |
            # PREFERRED FIX (do this once, then delete every "sudo"/"run_sudo"
            # below and the DEPLOY_PASSWORD sudo dance entirely):
            #   ssh in and run: sudo usermod -aG docker $USER
            #   then log out/in once so the group membership takes effect.
            # Until then, this helper re-authenticates sudo on EVERY call
            # instead of relying on sudo's cached timestamp — that cache
            # was the actual bug: it expires (often in under 5 min) while
            # `docker pull` is still downloading layers, so the LAST sudo
            # command in the script (image prune) had no valid credential
            # left and no TTY to prompt for one.
            run_sudo() {
              echo "$DEPLOY_PASSWORD" | sudo -S "$@"
            }

            # Same idea as run_sudo, but for commands that themselves need
            # to read something from stdin (e.g. `docker login --password-stdin`).
            # sudo -S eats the FIRST line of stdin for its own password
            # prompt, so anything the wrapped command needs to read must be
            # queued up AFTER that line, in the same stream — not fed in via
            # a separate `<<<` on the outer call, which was the actual bug:
            # sudo -S was silently consuming DEPLOY_PASSWORD as if it were
            # the GHCR PAT, so the real PAT never reached `docker login` and
            # the login step failed every time without ever raising an error.
            run_sudo_with_stdin() {
              local payload="$1"
              shift
              { echo "$DEPLOY_PASSWORD"; printf '%s' "$payload"; } | sudo -S "$@"
            }

            # Sanity-check sudo works before doing anything else.
            run_sudo -v

            # Log in to GHCR on the server (needed if the package is private)
            run_sudo_with_stdin "$GHCR_PAT" docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Pull the freshly built image
            run_sudo docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}:latest

            # Remove the old container if it exists
            run_sudo docker stop pipeline-ui || true
            run_sudo docker rm pipeline-ui || true

            # Make sure the server's OWN firewall isn't silently dropping
            # inbound traffic on 8000 — this is the #1 cause of the
            # container running fine (curl works from inside the server)
            # while the outside world gets ERR_CONNECTION_TIMED_OUT.
            # Handles the two most common Linux firewalls; harmless no-op
            # if neither is installed/active.
            if run_sudo bash -c 'command -v ufw' >/dev/null 2>&1; then
              if run_sudo bash -c 'ufw status' | grep -q "Status: active"; then
                echo "ufw is active — opening 8000/tcp"
                run_sudo ufw allow 8000/tcp || true
              fi
            fi
            if run_sudo bash -c 'command -v firewall-cmd' >/dev/null 2>&1; then
              if run_sudo bash -c 'firewall-cmd --state' 2>/dev/null | grep -q "running"; then
                echo "firewalld is active — opening 8000/tcp"
                run_sudo firewall-cmd --permanent --add-port=8000/tcp || true
                run_sudo firewall-cmd --reload || true
              fi
            fi

            # Start the new container with the same port mapping
            run_sudo docker run -d \
              --name pipeline-ui \
              --restart unless-stopped \
              -p 8000:8000 \
              ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}:latest

            # Wait for the container to actually reach "running" instead of
            # trusting that `docker run -d` returning means it's up. If it
            # crashes or never leaves "created", fail loudly with logs
            # instead of silently leaving a dead container behind.
            echo "Waiting for container to become healthy..."
            RUNNING=0
            for i in $(seq 1 15); do
              STATUS=$(run_sudo docker inspect -f '{{.State.Status}}' pipeline-ui 2>/dev/null || echo "unknown")
              echo "Attempt $i: container status = $STATUS"
              if [ "$STATUS" = "running" ]; then
                RUNNING=1
                break
              fi
              sleep 2
            done

            if [ "$RUNNING" -ne 1 ]; then
              echo "::error::Container never reached 'running' state. Recent logs:"
              run_sudo docker logs --tail 100 pipeline-ui || true
              exit 1
            fi

            # Confirm the API is actually answering on port 8000 before
            # declaring success (catches crash-loops that briefly show
            # "running" then die).
            echo "Verifying FastAPI is responding on :8000/docs ..."
            API_UP=0
            for i in $(seq 1 15); do
              if run_sudo curl -sf -o /dev/null http://localhost:8000/docs; then
                API_UP=1
                break
              fi
              echo "API not ready yet (attempt $i)..."
              sleep 2
            done

            if [ "$API_UP" -ne 1 ]; then
              echo "::error::Container is running but /docs never responded. Recent logs:"
              run_sudo docker logs --tail 100 pipeline-ui || true
              exit 1
            fi

            echo "Deployment successful — FastAPI is confirmed reachable on localhost:8000/docs"
            echo "NOTE: if http://${{ secrets.DEPLOY_HOST }}:8000/docs still times out from your"
            echo "browser, the server-side firewall has just been opened above, but a cloud"
            echo "provider's security group / NSG (AWS/Azure/GCP/etc.) must also allow inbound"
            echo "TCP 8000 from the internet — that setting lives in the cloud console, not here."

            # Clean up old dangling images to save disk space
            run_sudo docker image prune -f
