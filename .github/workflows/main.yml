name: Backend CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.11'
  REGISTRY: ghcr.io
  # Docker image names must be all lowercase — your repo (vatsav466/HPCL-Backend)
  # has capital letters, so this is hardcoded lowercase already.
  IMAGE_NAME: vatsav466/hpcl-backend

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------
  # 1. LINT + UNIT TESTS
  # ---------------------------------------------------------
  lint-and-test:
    name: Lint & Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # flake8/pytest may not be pinned in requirements.txt — install if missing
          pip install flake8 pytest pytest-cov

      - name: Sanitize .flake8 config
        run: |
          if [ -f ".flake8" ]; then
            # flake8's config parser breaks on inline "# comment" text after a
            # value on the same line (e.g. "extend-ignore = E203  # note")
            # -- it tries to parse the comment as part of the value and raises
            # ValueError. This strips any trailing "# ..." from every line in
            # .flake8 before flake8 reads it, without touching the real values.
            sed -i -E 's/#.*$//' .flake8
            # Remove now-empty trailing whitespace on each line
            sed -i -E 's/[[:space:]]+$//' .flake8
            echo "Sanitized .flake8:"
            cat .flake8
          else
            echo "No .flake8 file found, skipping sanitize step."
          fi

      - name: Run flake8
        id: flake8
        continue-on-error: true
        run: |
          flake8 . --count --statistics

      - name: Report flake8 outcome
        if: steps.flake8.outcome == 'failure'
        run: |
          echo "::warning::flake8 found style/lint issues. See the 'Run flake8' step above for details."
          echo "### ⚠️ flake8 found issues" >> $GITHUB_STEP_SUMMARY
          echo "See the 'Run flake8' step logs for the full list. Continuing pipeline anyway." >> $GITHUB_STEP_SUMMARY

      - name: Run pytest
        id: pytest
        run: |
          # Sibling-module imports (e.g. "import hpcl_ceg_model") only resolve
          # when a test is run from inside its own service folder, because
          # Python adds the current working directory to sys.path — that dir
          # is never on sys.path when pytest runs from the repo root instead.
          # Fix: add every subfolder (depth 1-2) to PYTHONPATH up front, so
          # every service's local imports resolve regardless of pytest's cwd.
          EXTRA_PATHS=$(find . -mindepth 1 -maxdepth 2 -type d \
            ! -path '*/.git*' ! -path '*/node_modules/*' ! -path '*/venv/*' ! -path '*/.venv/*' \
            | tr '\n' ':')
          export PYTHONPATH="${EXTRA_PATHS}${PYTHONPATH}"
          echo "PYTHONPATH=$PYTHONPATH"
          pytest --cov=. --cov-report=xml --cov-report=term -v

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 7

  # ---------------------------------------------------------
  # 2. DOCKER BUILD & PUSH TO CONTAINER REGISTRY (GHCR)
  # ---------------------------------------------------------
  docker-build-and-push:
    name: Build & Push Docker Image
    needs: lint-and-test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---------------------------------------------------------
  # 3. DEPLOY — connects to your server and redeploys
  # ---------------------------------------------------------
  deploy:
    name: Deploy
    needs: docker-build-and-push
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Verify required secrets are set
        run: |
          missing=0
          [ -z "${{ secrets.DEPLOY_HOST }}" ] && echo "::error::DEPLOY_HOST secret is missing or empty" && missing=1
          [ -z "${{ secrets.DEPLOY_USER }}" ] && echo "::error::DEPLOY_USER secret is missing or empty" && missing=1
          [ -z "${{ secrets.DEPLOY_PASSWORD }}" ] && echo "::error::DEPLOY_PASSWORD secret is missing or empty" && missing=1
          [ -z "${{ secrets.GHCR_PAT }}" ] && echo "::error::GHCR_PAT secret is missing or empty" && missing=1
          if [ "$missing" -eq 1 ]; then
            echo "Add the missing secret(s) under Settings > Secrets and variables > Actions > Secrets tab (repository secrets)."
            exit 1
          fi
          echo "All required secrets are present."

      - name: Deploy to server via SSH
        env:
          DEPLOY_PASSWORD: ${{ secrets.DEPLOY_PASSWORD }}
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          password: ${{ secrets.DEPLOY_PASSWORD }}
          port: 22
          envs: DEPLOY_PASSWORD
          script: |
            run_sudo() {
              echo "$DEPLOY_PASSWORD" | sudo -S "$@"
            }

            run_sudo -v

            run_sudo docker login ghcr.io -u ${{ github.actor }} --password-stdin <<< "${{ secrets.GHCR_PAT }}"

            run_sudo docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

            run_sudo docker stop hpcl-backend || true
            run_sudo docker rm hpcl-backend || true

            # Adjust the port mapping (left side = host port) to match what
            # your backend actually listens on.
            run_sudo docker run -d \
              --name hpcl-backend \
              --restart unless-stopped \
              -p 8000:8000 \
              ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

            run_sudo docker image prune -f
