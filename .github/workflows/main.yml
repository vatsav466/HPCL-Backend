name: Backend CI/CD Pipeline

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

  workflow_dispatch:

env:
  PYTHON_VERSION: "3.11"
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  # Directories that should never be linted / type-checked / scanned.
  # Keep this list in sync across every tool step below.
  EXCLUDE_DIRS: "venv,.venv,env,.env,__pycache__,build,dist,migrations,.git,node_modules"

jobs:

  # ---------------------------------------------------------
  # 1. LINT, TEST & SECURITY
  # ---------------------------------------------------------
  test:
    name: Lint, Test & Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      # Required for python-ldap
      - name: Install Ubuntu Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            python3-dev \
            libldap2-dev \
            libsasl2-dev \
            libssl-dev

      - name: Create Virtual Environment
        run: |
          python -m venv venv

      - name: Install Python Dependencies
        run: |
          source venv/bin/activate
          python -m pip install --upgrade pip setuptools wheel

          pip install -r requirements.txt

          pip install \
            flake8 \
            black \
            isort \
            mypy \
            pytest \
            pytest-cov \
            bandit \
            pip-audit

      # NOTE: venv/.venv/etc are excluded below so third-party packages
      # installed into the virtualenv are never linted as if they were
      # our own source code. This is what caused the flood of
      # pyasn1_modules / site-packages errors previously.

      - name: Run Flake8
        run: |
          source venv/bin/activate
          flake8 . --count --statistics --max-line-length=120 \
            --ignore=E301,E302,E303,E304,E305,E306,E401,E402,E501,E502,E701,E711,E712,E713,E722,E741,E999,F401,F403,F405,F541,F601,F811,F821,F824,W503,W504,F841,W191,W291,W292,W293,W391,W605 \
            --exclude="${{ env.EXCLUDE_DIRS }}"

      - name: Black Check
        run: |
          source venv/bin/activate
          black --check . \
            --extend-exclude "/(venv|\.venv|env|\.env|__pycache__|build|dist|migrations|node_modules)/"

      - name: Isort Check
        run: |
          source venv/bin/activate
          isort --check-only . \
            --skip venv --skip .venv --skip env --skip .env \
            --skip migrations --skip node_modules --skip build --skip dist

      - name: MyPy
        continue-on-error: true
        run: |
          source venv/bin/activate
          mypy . --ignore-missing-imports \
            --exclude '(venv|\.venv|env|\.env|migrations|build|dist|node_modules)/'

      - name: Run Unit Tests
        run: |
          source venv/bin/activate
          pytest -v

      - name: Coverage
        run: |
          source venv/bin/activate
          pytest --cov=. --cov-report=xml --cov-report=term

      - name: Upload Coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

      - name: Bandit Scan
        run: |
          source venv/bin/activate
          bandit -r . -x ./venv,./.venv,./env,./.env,./tests,./migrations,./node_modules -ll

      - name: Dependency Scan
        continue-on-error: true
        run: |
          source venv/bin/activate
          pip-audit -r requirements.txt

      - name: API Tests
        run: |
          if [ -f postman/collection.json ]; then
            npm install -g newman
            newman run postman/collection.json \
              -e postman/environment.json \
              --reporters cli,junit \
              --reporter-junit-export newman-report.xml
          else
            echo "No Postman collection found."
          fi

  # ---------------------------------------------------------
  # 2. BUILD & PUSH DOCKER IMAGE
  # ---------------------------------------------------------
  docker-build-and-push:
    name: Docker Build & Push
    needs: test
    runs-on: ubuntu-latest

    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Convert Image Name to Lowercase
        run: |
          echo "IMAGE_NAME_LOWER=$(echo '${{ env.IMAGE_NAME }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.IMAGE_NAME_LOWER }}:latest
            ghcr.io/${{ env.IMAGE_NAME_LOWER }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---------------------------------------------------------
  # 3. DEPLOY
  # ---------------------------------------------------------
  deploy:
    name: Deploy
    needs: docker-build-and-push
    runs-on: ubuntu-latest

    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Set lowercase image name
        run: |
          echo "IMAGE_NAME_LOWER=$(echo '${{ env.IMAGE_NAME }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Verify required secrets
        run: |
          missing=0

          [ -z "${{ secrets.DEPLOY_HOST }}" ] && echo "::error::DEPLOY_HOST missing" && missing=1
          [ -z "${{ secrets.DEPLOY_USER }}" ] && echo "::error::DEPLOY_USER missing" && missing=1
          [ -z "${{ secrets.DEPLOY_PASSWORD }}" ] && echo "::error::DEPLOY_PASSWORD missing" && missing=1
          [ -z "${{ secrets.GHCR_PAT }}" ] && echo "::error::GHCR_PAT missing" && missing=1

          if [ "$missing" -eq 1 ]; then
            exit 1
          fi

      - name: Deploy to Server
        uses: appleboy/ssh-action@v1.0.3
        env:
          DEPLOY_PASSWORD: ${{ secrets.DEPLOY_PASSWORD }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          password: ${{ secrets.DEPLOY_PASSWORD }}
          port: 22
          envs: DEPLOY_PASSWORD
          script: |

            run_sudo() {
              echo "$DEPLOY_PASSWORD" | sudo -S "$@"
            }

            run_sudo -v

            run_sudo docker login ghcr.io \
              -u ${{ github.actor }} \
              --password-stdin <<< "${{ secrets.GHCR_PAT }}"

            run_sudo docker pull ghcr.io/${{ env.IMAGE_NAME_LOWER }}:latest

            run_sudo docker stop hpcl-backend || true
            run_sudo docker rm hpcl-backend || true

            run_sudo docker run -d \
              --name hpcl-backend \
              --restart unless-stopped \
              -p 8000:8000 \
              ghcr.io/${{ env.IMAGE_NAME_LOWER }}:latest

            run_sudo docker image prune -af