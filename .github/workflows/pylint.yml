name: Backend CI Pipeline

on:
  push:
    branches:
      - main
      - backend
      - pipeline

  pull_request:
    branches:
      - main
      - backend

permissions:
  contents: read

jobs:
  backend-ci:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version:
          - "3.10"

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Ubuntu Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gcc \
            g++ \
            build-essential \
            libldap2-dev \
            libsasl2-dev \
            libssl-dev \
            ldap-utils

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install Requirements
        run: |
          python -m pip install flake8 pylint pytest
          if [ -f requirements.txt ]; then
            python -m pip install -r requirements.txt
          fi

      - name: Run Flake8
        run: |
          flake8 . --isolated \
            --count \
            --select=E9,F63,F7,F82 \
            --show-source \
            --statistics

          flake8 . --isolated \
            --count \
            --exit-zero \
            --max-complexity=10 \
            --max-line-length=127 \
            --statistics

      - name: Run Pylint
        run: |
          FILES=$(git ls-files "*.py")
          if [ -n "$FILES" ]; then
            pylint $FILES
          else
            echo "No Python files found."
          fi

      - name: Run Pytest
        run: |
          if [ -d tests ]; then
            pytest -v
          else
            echo "No tests directory found."
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Newman
        run: npm install -g newman

      - name: Run Newman Collection
        run: |
          if [ -f tests/postman_collection.json ]; then
            newman run tests/postman_collection.json
          else
            echo "No Postman collection found."
          fi

      - name: Upload Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: newman-report
          path: tests/
          if-no-files-found: ignore
