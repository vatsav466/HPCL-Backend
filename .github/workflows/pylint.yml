name: Backend CI

on:
  push:
    branches:
      - main
      - backend
      - pipeline
  pull_request:
    branches:
      - main
      - backend

permissions:
  contents: read

jobs:
  test-and-lint:
    name: Test & Lint (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.10"
          - "3.11"

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Upgrade pip
        run: |
          python -m pip install --upgrade pip

      - name: Install Dependencies
        run: |
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

          pip install pytest flake8 pylint

      - name: Run Flake8
        run: |
          flake8 . \
            --count \
            --select=E9,F63,F7,F82 \
            --show-source \
            --statistics

          flake8 . \
            --count \
            --exit-zero \
            --max-complexity=10 \
            --max-line-length=127 \
            --statistics

      - name: Run Pylint
        run: |
          FILES=$(git ls-files "*.py")

          if [ -n "$FILES" ]; then
            pylint $FILES
          else
            echo "No Python files found."
          fi

      - name: Run Pytest
        run: |
          if [ -d tests ]; then
            pytest -v
          else
            echo "No tests directory found. Skipping tests."
          fi
