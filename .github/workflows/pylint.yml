name: Backend CI Pipeline

on:
  push:
    branches:
      - main
      - backend
      - pipeline

  pull_request:
    branches:
      - main
      - backend

permissions:
  contents: read

jobs:
  backend-ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Ubuntu Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gcc \
            g++ \
            build-essential \
            libldap2-dev \
            libsasl2-dev \
            libssl-dev \
            ldap-utils

      - name: Install Python Tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install flake8 pylint pytest
          if [ -f requirements.txt ]; then
            python -m pip install -r requirements.txt
          fi

      - name: Run Flake8
        continue-on-error: true
        run: |
          flake8 . --isolated \
            --ignore=E999,F821,F824 \
            --max-line-length=127 \
            --max-complexity=10 \
            --statistics

      - name: Run Pylint
        continue-on-error: true
        run: |
          FILES=$(git ls-files "*.py")
          if [ -n "$FILES" ]; then
            pylint $FILES
          else
            echo "No Python files found."
          fi

      - name: Run Pytest
        continue-on-error: true
        run: |
          if [ -d tests ]; then
            pytest -v
          else
            echo "No tests directory found."
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Newman
        run: npm install -g newman

      - name: Run Newman Collection
        continue-on-error: true
        run: |
          if [ -f tests/postman_collection.json ]; then
            newman run tests/postman_collection.json
          else
            echo "No Postman collection found."
          fi
