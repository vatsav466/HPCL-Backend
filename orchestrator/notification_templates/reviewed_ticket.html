<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ticket Notification</title>
  <style>
    body { font-family: Arial, sans-serif; background: #ffffff; padding: 30px; color: #000000; }
    .wrapper { max-width: 600px; margin: 0 auto; }
    .main-message { font-size: 14px; line-height: 1.85; color: #000000; }
  </style>
</head>
<body>
<div class="wrapper">
  <div class="main-message">
    OCC has reviewed ticket (<strong>{{ ticket_id }}</strong>) pertaining to location 
    (<strong>{{ location_name }}</strong>) for
    <strong>"{{ category }}"</strong> — <strong>"{{ sub_category }}"</strong>. Ticket is closed.

  </div>
</div>
</body>
</html>
