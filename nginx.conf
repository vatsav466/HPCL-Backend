server {
    listen 5378;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 100M;

    # React / Vite SPA
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Images
    location /digitaltwin-images/ {
        alias /opt/digitaltwin_images/;

        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods "GET, OPTIONS";
        add_header Access-Control-Allow-Headers *;

        types {
            model/gltf-binary glb;
        }
    }

    # Backend API
    location /api/ {
        proxy_pass https://13.126.249.159/api/;

        proxy_ssl_verify off;
        proxy_ssl_server_name on;

        proxy_http_version 1.1;

        proxy_set_header Host 13.126.249.159;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Second Backend
    location /api123/ {
        proxy_pass https://novex.hpcl.co.in/api/;

        proxy_ssl_server_name on;

        proxy_http_version 1.1;

        proxy_set_header Host novex.hpcl.co.in;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    error_page 500 502 503 504 /custom_502.html;

    location = /custom_502.html {
        root /usr/share/nginx/html;
        internal;
    }
}
